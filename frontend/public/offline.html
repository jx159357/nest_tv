<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nest TV - 离线状态</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; color: #e2e8f0;
    }
    .offline-container {
      background: #141a2a; border-radius: 20px; padding: 60px 40px;
      text-align: center; max-width: 500px; width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .offline-icon {
      width: 120px; height: 120px; margin: 0 auto 30px;
      background: rgba(99, 102, 241, 0.1); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite;
    }
    .offline-icon svg { width: 60px; height: 60px; color: #6366f1; }
    h1 { font-size: 28px; color: #e2e8f0; margin-bottom: 15px; font-weight: 600; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
    .retry-button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none; padding: 15px 40px; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    .features {
      margin-top: 40px; padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .features h3 { font-size: 16px; color: #94a3b8; margin-bottom: 15px; }
    .feature-list {
      list-style: none; display: flex; flex-wrap: wrap;
      justify-content: center; gap: 10px;
    }
    .feature-list li {
      background: rgba(99, 102, 241, 0.1); padding: 8px 16px;
      border-radius: 20px; font-size: 14px; color: #a5b4fc;
    }
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
    }
    @media (max-width: 480px) {
      .offline-container { padding: 40px 20px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
      </svg>
    </div>
    <h1>网络连接已断开</h1>
    <p>您当前处于离线状态。请检查网络连接后重试。</p>
    <button class="retry-button" onclick="window.location.reload()">重新连接</button>
    <div class="features">
      <h3>离线时您可以：</h3>
      <ul class="feature-list">
        <li>查看已缓存的内容</li>
        <li>浏览观看历史</li>
        <li>管理收藏列表</li>
      </ul>
    </div>
  </div>
</body>
</html>
