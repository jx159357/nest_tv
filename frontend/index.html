<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Nest TV - 在线影视观看</title>

    <!-- PWA相关 -->
    <meta name="description" content="Nest TV - 高清在线影视观看平台" />
    <meta name="keywords" content="视频, 电影, 电视剧, 在线观看, 流媒体" />

    <!-- 结构化数据 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Nest TV",
      "description": "高清在线影视观看平台",
      "url": "/",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web Browser"
    }
    </script>
  </head>
  <body>
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('nest-tv-theme');
          var theme = savedTheme === 'light' ? 'light' : 'dark';
          var root = document.documentElement;
          var themeColor = document.querySelector('meta[name="theme-color"]');

          root.classList.toggle('dark', theme === 'dark');
          root.dataset.theme = theme;
          root.style.colorScheme = theme;

          if (themeColor) {
            themeColor.setAttribute('content', theme === 'dark' ? '#08090d' : '#ffffff');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
