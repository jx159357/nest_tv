<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Nest TV - 在线影视观看</title>

    <!-- PWA相关 -->
    <meta name="description" content="Nest TV - 高清在线影视观看平台" />
    <meta name="keywords" content="视频, 电影, 电视剧, 在线观看, 流媒体" />

    <!-- 结构化数据 -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Nest TV",
        "description": "高清在线影视观看平台",
        "url": "/",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web Browser"
      }
    </script>
  </head>
  <body>
    <script>
      (function () {
        var root = document.documentElement;
        var themeColor = document.querySelector('meta[name="theme-color"]');
        var getSystemTheme = function () {
          return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
            ? 'light'
            : 'dark';
        };
        var applyTheme = function (theme) {
          var resolvedTheme = theme === 'system' ? getSystemTheme() : theme;

          root.classList.toggle('dark', resolvedTheme === 'dark');
          root.dataset.theme = resolvedTheme;
          root.dataset.themePreference = theme;
          root.style.colorScheme = resolvedTheme;

          if (themeColor) {
            themeColor.setAttribute('content', resolvedTheme === 'dark' ? '#08090d' : '#ffffff');
          }
        };

        try {
          var savedTheme = localStorage.getItem('nest-tv-theme');
          var theme =
            savedTheme === 'light' || savedTheme === 'dark' || savedTheme === 'system'
              ? savedTheme
              : 'system';

          applyTheme(theme);
        } catch (e) {
          applyTheme('system');
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
